services:
  sekolahku:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Website Sekolah Terpadu}
    container_name: sekolahku-app
    restart: unless-stopped
    ports:
      - "3000:8181"
    environment:
      PORT: 8181
      TZ: Asia/Jakarta
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8181/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
